# Деплой за Traefik (сеть web должна существовать: docker network create web).
# Перед запуском: cp env.example .env
#
# Тома:
#   ../data        — SQLite marketbw.db (персистентная БД на сервере)
#   ../public/images — картинки каталога и загрузки (можно заменить путём на сервере)

services:
  marketbw:
    container_name: ${SITE_CONTAINER_NAME:-marketbw-app}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${MARKETBW_IMAGE_NAME:-marketbw-local}
    restart: unless-stopped
    networks:
      - web
    environment:
      DATA_DIR: /var/www/data
      IMAGES_DIR: /var/www/images
      APP_DEBUG: ${APP_DEBUG:-false}
      SESSION_FORCE_SECURE: ${SESSION_FORCE_SECURE:-true}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      SITE_NAME: ${SITE_NAME:-Bead Wonder}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-your-email@example.com}
      CONTACT_PHONE: ${CONTACT_PHONE:-+7 (999) 123-45-67}
      SOCIAL_INSTAGRAM: ${SOCIAL_INSTAGRAM:-#}
      SOCIAL_TELEGRAM: ${SOCIAL_TELEGRAM:-#}
      SOCIAL_VK: ${SOCIAL_VK:-#}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-}
      BASE_PATH: ${BASE_PATH:-}
      MASTER_NAME: ${MASTER_NAME:-}
      MASTER_TAGLINE: ${MASTER_TAGLINE:-}
      CONTACT_WHATSAPP: ${CONTACT_WHATSAPP:-}
    volumes:
      - ../data:/var/www/data
      - ../public/images:/var/www/images
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-web}
      - "traefik.http.routers.${TRAEFIK_ROUTER:-marketbw}.rule=${TRAEFIK_RULE}"
      - traefik.http.routers.${TRAEFIK_ROUTER:-marketbw}.service=${TRAEFIK_ROUTER:-marketbw}
      - traefik.http.routers.${TRAEFIK_ROUTER:-marketbw}.entrypoints=${TRAEFIK_HTTPS_ENTRYPOINT:-websecure}
      - traefik.http.routers.${TRAEFIK_ROUTER:-marketbw}.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.services.${TRAEFIK_ROUTER:-marketbw}.loadbalancer.server.port=80

networks:
  web:
    external: true
    name: ${TRAEFIK_NETWORK:-web}
