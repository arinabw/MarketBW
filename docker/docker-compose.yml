services:
  marketbw:
    container_name: marketbw-app
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - marketbw-stack-net

networks:
  marketbw-stack-net:
    driver: bridge
    name: marketbw-stack-net